spring:
    profiles:
        include:
            - redis
            - datasource
            - security

# Actuator
management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
            base-path: /actuator
        jmx:
            exposure:
                exclude: "*"
    endpoint:
        health:
            show-details: never
    individual:
        health:
            
#Payment
vnpay:
    tmn-code: U2BYG43H
    hash-secret: ${VNPAY_HASH_SECRET:}
    pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: http://localhost:8080/payments/vnpay-return

server:
    port: 8081

#Swagger
swagger:
    version: ${SWAGGER_VERSION:default}
    user: ${SWAGGER_USER:default}
    password: ${SWAGGER_PASSWORD:default}
springdoc:
    default-consumes-media-type: application/json;charset=UTF-8
    default-produces-media-type: application/json;charset=UTF-8
    swagger-ui:
        path: /swagger-ui
        disable-swagger-default-url: true
        display-request-duration: true
        tags-sorter: alpha
        operations-sorter: alpha
        syntax-highlight:
            theme: none
        urls-primary-name: 10MM API DOCS